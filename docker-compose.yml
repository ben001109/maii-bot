# 現代化的 Docker Compose 文件，無需 version 屬性

services:
  maii-bot:
    image: node:20-alpine
    container_name: maii-bot
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
    command: >
      sh -c "npm install --omit=dev && 
             npx prisma generate && 
             npx prisma migrate deploy && 
             node src/index.js"
    networks:
      - maii-network

  postgres:
    image: postgres:14-alpine
    container_name: maii-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: Ben00334.com
      POSTGRES_USER: bot
      POSTGRES_DB: maii
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - maii-network
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: maii-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - maii-network
    ports:
      - "6379:6379"

networks:
  maii-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
